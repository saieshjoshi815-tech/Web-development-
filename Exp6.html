<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFrame Tag</title>
    
</head>
<body>

    <div class="info-header">
        <div>Name: <span>Saiesh Joshi</span></div>
        <div>Roll No: <span>60</span> | Batch: <span>S3</span></div>
        <div>Experiment No: <span>6</span></div>
    </div>

    <hr>

    <div class="container">
        <h1>HTML iFrame Example</h1>

        <div class="card">
            <p>This experiment demonstrates the use of iframes to embed external content, such as YouTube videos, directly into a web page.</p>
        </div>

        <div class="card">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px;">
                <iframe src="https://www.youtube.com/embed/ZPdk5GaIDjo" title="YouTube video player 1" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/BsDoLVMnmZs" title="YouTube video player 2" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/cLp-tYE48wc" title="YouTube video player 3" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/JcIkWZUOWzA" title="YouTube video player 4" allowfullscreen></iframe>
            </div>
        </div>

        
    </div>

</body>
</html>
